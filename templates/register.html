{% extends "base.html" %}
{% block title %}Đăng ký — Yến Sào Nha Trang{% endblock %}

{% block content %}
<section class="page-hero page-hero--sm">
  <div class="container">
    <h1 class="page-title">Đăng ký tài khoản</h1>
    <p class="page-sub">Tạo tài khoản để lưu giỏ hàng trên máy chủ và thanh toán nhanh hơn.</p>
  </div>
</section>

<section class="section auth-section">
  <div class="container auth-wrap auth-wrap--wide">
    <form class="auth-card contact-form" method="post" action="{{ url_for('register') }}" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="username">Tên đăng nhập <span class="req">*</span></label>
          <input type="text" id="username" name="username" required autocomplete="username"
            value="{{ form.username if form else '' }}" placeholder="chuỗi chữ, số, gạch dưới">
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu <span class="req">*</span></label>
          <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Tối thiểu 6 ký tự">
        </div>
      </div>
      <div class="form-group">
        <label for="full_name">Họ và tên <span class="req">*</span></label>
        <input type="text" id="full_name" name="full_name" required autocomplete="name"
          value="{{ form.full_name if form else '' }}" placeholder="Nguyễn Văn A">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="phone">Số điện thoại</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel"
            value="{{ form.phone if form else '' }}" placeholder="09xx xxx xxx">
        </div>
        <div class="form-group">
          <label for="address">Địa chỉ (tùy chọn)</label>
          <input type="text" id="address" name="address" autocomplete="street-address"
            value="{{ form.address if form else '' }}" placeholder="Dùng cho giao hàng sau này">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
      <p class="auth-alt">Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
    </form>
  </div>
</section>
{% endblock %}
